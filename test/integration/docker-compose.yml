name: "kamal-podman-test"

volumes:
  shared:
  registry:
  deployer_bundle:

services:
  shared:
    build:
      context: docker/shared
    volumes:
      - shared:/shared

  registry:
    build:
      context: docker/registry
    volumes:
      - registry:/var/lib/registry
    ports:
      - "5000:5000"

  deployer:
    privileged: true
    build:
      context: docker/deployer
    environment:
      - TEST_ID=${TEST_ID:-}
    volumes:
      - ../..:/kamal_podman
      - shared:/shared
      - deployer_bundle:/usr/local/bundle/
    depends_on:
      - vm1
      - registry

  vm1:
    privileged: true
    build:
      context: docker/vm
    volumes:
      - shared:/shared
    tmpfs:
      - /run
      - /tmp
    ports:
      - "2222:22"
    environment:
      - TEST_ID=${TEST_ID:-}
    hostname: vm1
