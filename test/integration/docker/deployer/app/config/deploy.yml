service: app
image: app
servers:
  - vm1

proxy:
  host: vm1
  run:
    registry: registry:5000
    version: v0.9.2
    options:
      cap-add: NET_BIND_SERVICE

registry:
  server: registry:5000
  username: testuser
  password: testpass

builder:
  arch: amd64
  args:
    COMMIT_SHA: <%= `git rev-parse HEAD`.strip %>

ssh:
  user: root

readiness_delay: 0
deploy_timeout: 30
drain_timeout: 2
